    <script>
(function(){
  const SHOW_AT = 257; // segundos (use 257 para 4:17)
  const cta = document.getElementById('cta-upsell');
  let unlocked = false;
  let videoEl = null;

  function showCTA() {
    if (unlocked) return;
    unlocked = true;
    cta.style.display = 'block';
  }

  function bindVideo(v) {
    if (!v) return;
    videoEl = v;
    const check = () => {
      if (v.currentTime >= SHOW_AT) showCTA();
    };
    v.addEventListener('timeupdate', check);
    v.addEventListener('ended', showCTA);
    check();
  }

  // tenta achar vídeo dentro do shadow DOM
  function tryFindVideo() {
    const sp = document.querySelector('vturb-smartplayer#vid-68fac6d266761c45106ecffd');
    if (!sp) return null;
    let v = sp.querySelector('video');
    if (!v && sp.shadowRoot) v = sp.shadowRoot.querySelector('video');
    if (!v && sp.shadowRoot) {
      // níveis mais profundos
      const deep = sp.shadowRoot.querySelectorAll('video');
      if (deep.length) v = deep[0];
    }
    return v;
  }

  // tenta até encontrar o player carregado
  function waitForPlayer() {
    const found = tryFindVideo();
    if (found) {
      bindVideo(found);
      return;
    }
    requestAnimationFrame(waitForPlayer);
  }

  // força fallback — se o vídeo não for detectável, libera pelo tempo de relógio
  function startFallbackTimer() {
    const start = Date.now();
    const timer = setInterval(() => {
      if (unlocked) {
        clearInterval(timer);
        return;
      }
      if ((Date.now() - start) / 1000 >= SHOW_AT) {
        showCTA();
        clearInterval(timer);
      }
    }, 500);
  }

  // Inicia verificação após o player ser criado
  document.addEventListener('DOMContentLoaded', () => {
    waitForPlayer();
    startFallbackTimer();
  });
})();
</script>
